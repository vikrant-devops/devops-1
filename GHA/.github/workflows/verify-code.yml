name: Code Quality Check
on:
  pull_request: # Runs when a PR is opened or updated
    branches: [main]

jobs:
  check-files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4 # This "clones" your code into the runner

      - name: List files for debugging
        run: ls -R

      - name: Check for empty files
        run: |
          if find . -type f -empty | read; then
            echo "Error: Empty files found!"
            exit 1 # This fails the Action
          else
            echo "All files look good."
          fi