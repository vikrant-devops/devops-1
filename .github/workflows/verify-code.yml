name: Code Quality Check
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: List files for debugging
        run: ls -R

      - name: Check for empty files
        run: |
          if find . -type f -empty | read; then
            echo "Error: Empty files found!"
            exit 1
          else
            echo "All files look good."
          fi